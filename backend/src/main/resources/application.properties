spring.application.name=patternsense-backend

# Supabase Postgres datasource
spring.datasource.url=jdbc:postgresql://db.gocuqeqobslgxspsiqlc.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Supabase JWT secret — set as environment variable in IntelliJ run config
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
